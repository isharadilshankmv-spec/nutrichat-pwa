<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#0d0d0d" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="NutriChat" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <title>NutriChat</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        background: #0d0d0d;
        font-family: 'DM Sans', 'Segoe UI', sans-serif;
        height: 100%;
        width: 100%;
        max-width: 100%;
        overflow: hidden;            /* lock the page — only inner areas scroll */
        overscroll-behavior: none;   /* no rubber-band bounce */
        position: fixed;             /* iOS: pin the body so it can't drag */
        top: 0; left: 0; right: 0; bottom: 0;
      }
      #root { height: 100%; width: 100%; overflow: hidden; }
      /* 16px minimum prevents iOS auto-zoom on input focus.
         !important so it beats inline font-size styles too. */
      input, textarea, select { font-size: 16px !important; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(r => console.log('SW registered'))
            .catch(e => console.log('SW failed', e));
        });
      }
    </script>
  </body>
</html>
